# Example 3 — Post to GitHub Issues
#
# Creates a GitHub Issue for each assessment run instead of (or as well as)
# a PR comment. Each issue title includes the branch name and head commit SHA
# so runs are distinct and searchable. Previous open issues for the same branch
# are automatically closed.
#
# Copy this file to .github/workflows/assess.yml in the student/client repo.

name: Code Assessment

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  assess:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # required to create the GitHub Issue
      models: read # required to call GitHub Models API
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for diff resolution

      - uses: NSCC-ITC-Assessment/GrillMyCode@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          post_issue: "true"
          post_pr_comment: "false"
          num_questions: "5"
          additional_context: "Assignment 2 — Data structures and algorithms"
