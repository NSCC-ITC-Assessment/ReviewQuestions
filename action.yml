name: "Grill My Code"
description: >
  Analyses code changes submitted via GitHub and uses AI to generate targeted
  comprehension questions for spoken or written assessments. Created to promote 
  code comprehension and critical thinking in NSCC's ITC courses, but adaptable to 
  various educational contexts.
author: "NSCC-ITC"
branding:
  icon: "book-open"
  color: "blue"

# ─── Inputs ──────────────────────────────────────────────────────────────────

inputs:
  github_token:
    description: >
      GitHub token used for API access and as the credential for GitHub Models.
      Defaults to the built-in GITHUB_TOKEN.
    required: true
    default: ${{ github.token }}

  ai_provider:
    description: >
      AI provider to use for question generation.
      Supported values: github-models | openai | openrouter | azure-openai
    required: false
    default: "github-models"

  ai_model:
    description: >
      Model identifier for the chosen provider.
      GitHub Models examples : gpt-4o, gpt-4o-mini, Phi-3-mini-128k-instruct
      OpenAI examples        : gpt-4o, gpt-4-turbo
      Azure OpenAI           : your deployment name
    required: false
    default: "gpt-4o"

  api_key:
    description: >
      API key for the chosen AI provider.
      For github-models, leave empty to use github_token automatically, or supply a
      Personal Access Token (e.g. an instructor token with an alternative license)
      to use that instead.
    required: false
    default: ""

  azure_endpoint:
    description: >
      Full Azure OpenAI endpoint URL, required only when ai_provider is azure-openai.
      Example: https://my-resource.openai.azure.com/openai/deployments/my-deployment
    required: false
    default: ""

  num_questions:
    description: "Number of comprehension questions to generate (minimum 1, maximum 50). Supplied values above 50 are automatically capped to 50."
    required: false
    default: "5"

  include_patterns:
    description: >
      Comma-separated glob patterns for files to include in the assessment.
      Leave empty to include all non-excluded files.
      Example: "*.py,*.js,src/**"
    required: false
    default: ""

  exclude_patterns:
    description: >
      Comma-separated glob patterns for files to exclude from the assessment.
      Defaults to common non-code files (lock files, images, build artifacts, etc.).
      Providing a value here completely replaces the default list.
    required: false
    default: ""

  output_file:
    description: >
      Basename for the assessment Markdown file. The file is always written
      under the _assessment/ folder in the repository root (e.g.
      grill-my-code.md → _assessment/grill-my-code.md) and committed back to
      the repository via the GitHub Contents API.
    required: false
    default: "grill-my-code.md"

  post_pr_comment:
    description: >
      Post the assessment as a comment on the pull request when the workflow is
      triggered by a pull_request or issue_comment event.
      Set to "false" to disable.
    required: false
    default: "true"

  post_issue:
    description: >
      Create a GitHub Issue in the repository containing the assessment questions.
      The issue title includes the branch name and head commit SHA so each
      assessment run produces a distinct, searchable issue.
      Set to "true" to enable.
    required: false
    default: "false"

  post_discussion:
    description: >
      Create a GitHub Discussion in the repository containing the assessment
      questions. Requires Discussions to be enabled on the repository.
      Set to "true" to enable.
    required: false
    default: "false"

  discussion_category:
    description: >
      The name of the Discussion category to post into.
      The category must already exist in the repository's Discussions settings.
      Example: "Assessments"
    required: false
    default: "Assessments"

  additional_context:
    description: >
      Free-text context about the assignment or topic being assessed. Helps the
      AI generate more relevant, targeted questions.
      Example: "Assignment 3 — Python list comprehensions and lambda functions"
    required: false
    default: ""

  skip_initial_commit:
    description: >
      When true (the default), the diff base is always pinned to the repository's
      very first commit so that starter/template files committed by GitHub Classroom
      are excluded from assessment. Set to "false" to use event-specific base
      detection (e.g. the PR base branch SHA for pull_request events).
    required: false
    default: "true"

  base_sha:
    description: >-
      Override the base commit SHA for the diff. When provided this takes
      precedence over skip_initial_commit. Auto-detected when not provided.
    required: false
    default: ""

  head_sha:
    description: >-
      Override the head commit SHA for the diff. Only applied when base_sha is
      also provided — both must be set together for the manual override to take
      effect. Auto-detected when not provided.
    required: false
    default: ""

# ─── Outputs ─────────────────────────────────────────────────────────────────

outputs:
  output_file:
    description: "Workspace-relative path to the generated assessment Markdown file."
  questions:
    description: "The raw generated questions as a string."
  code_before_strip:
    description: "The full code content of all assessed files before comment stripping."
  code_after_strip:
    description: "The full code content of all assessed files after comment stripping."

# ─── Execution ────────────────────────────────────────────────────────────────

runs:
  using: "docker"
  # This tag is a dev placeholder — the release workflow replaces it with an
  # immutable patch tag (e.g. :v1.0.3) each time a version tag is pushed.
  # Consumers pinning to GrillMyCode@v1 always resolve to the released image.
  image: "docker://ghcr.io/nscc-itc-assessment/grillmycode:latest"
  env:
    INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
    INPUT_AI_PROVIDER: ${{ inputs.ai_provider }}
    INPUT_AI_MODEL: ${{ inputs.ai_model }}
    INPUT_API_KEY: ${{ inputs.api_key }}
    INPUT_AZURE_ENDPOINT: ${{ inputs.azure_endpoint }}
    INPUT_NUM_QUESTIONS: ${{ inputs.num_questions }}
    INPUT_INCLUDE_PATTERNS: ${{ inputs.include_patterns }}
    INPUT_EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
    INPUT_OUTPUT_FILE: ${{ inputs.output_file }}
    INPUT_POST_PR_COMMENT: ${{ inputs.post_pr_comment }}
    INPUT_POST_ISSUE: ${{ inputs.post_issue }}
    INPUT_POST_DISCUSSION: ${{ inputs.post_discussion }}
    INPUT_DISCUSSION_CATEGORY: ${{ inputs.discussion_category }}
    INPUT_ADDITIONAL_CONTEXT: ${{ inputs.additional_context }}
    INPUT_SKIP_INITIAL_COMMIT: ${{ inputs.skip_initial_commit }}
    INPUT_BASE_SHA: ${{ inputs.base_sha }}
    INPUT_HEAD_SHA: ${{ inputs.head_sha }}
