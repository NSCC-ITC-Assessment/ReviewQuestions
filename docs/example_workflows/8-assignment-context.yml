# Example 8 — Assignment Context (automatic file injection)
#
# Uses the assignment_context input to automatically read one or more files
# from the repository and inject their contents into the AI prompt. This lets
# the AI focus its questions on the specific requirements of the assignment
# without manually copying assignment details into additional_context.
#
# Common files to include: README.md, assignment brief, rubric, coding-style
# guide, or any instructor-maintained requirements document.
#
# Copy this file to .github/workflows/assess.yml in the student/client repo.

name: Code Assessment

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  generate-questions:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to commit the output file back to the repo
      models: read # required to call GitHub Models API
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history required for diff resolution

      - uses: NSCC-ITC-Assessment/GrillMyCode@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          num_questions: "5"
          # Read files from anywhere in the repository and inject their contents
          # as context into the AI prompt automatically. Globs are matched against
          # the full relative path from the repo root, so subdirectory paths and
          # wildcards work (e.g. "docs/assignment.md", "**/*.md").
          assignment_context: "README.md, assignment.md"
