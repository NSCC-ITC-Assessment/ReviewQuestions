# Example 5 — Third-party AI Provider (OpenAI / OpenRouter)
#
# Uses an external AI provider instead of GitHub Models. Set ai_provider to
# "openai" or "openrouter" and store the corresponding API key as a repository
# secret. Useful when a higher question count or a specific model is required.
#
# Supported providers: openai | openrouter
# Store the API key as a secret named OPENAI_API_KEY (or OPENROUTER_API_KEY)
# in the client repository's Settings → Secrets and variables → Actions.
#
# Copy this file to .github/workflows/assess.yml in the student/client repo.

name: Code Assessment

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  assess:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # required to post the PR comment
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for diff resolution

      - uses: NSCC-ITC-Assessment/ReviewQuestions@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          ai_provider: "openai"
          ai-model: "gpt-4o"
          api-key: ${{ secrets.OPENAI_API_KEY }}
          num-questions: "8"
          additional-context: "Web Development — REST API design with Express.js"
